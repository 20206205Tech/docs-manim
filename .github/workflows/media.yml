name: Build Manim Media and Deploy

on:
  push:
    branches: [main]
    paths:
      - "**/*.py"
  pull_request:
    branches: [main]

# Phân quyền CẦN THIẾT cho GitHub Pages Artifact
permissions:
  contents: read
  pages: write
  id-token: write

# Giới hạn chỉ chạy 1 deploy tại 1 thời điểm
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_media:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies for Manim
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg build-essential libcairo2-dev libpango1.0-dev pkg-config

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync

      - name: Cache Manim Media
        uses: actions/cache@v4
        with:
          path: media/
          key: ${{ runner.os }}-manim-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-manim-

      - name: Render Manim Video (1080p60)
        run: uv run manim -qh kafka_sim.py KafkaArchitecture

      - name: Prepare Web Files
        run: |
          mkdir -p public/media
          cp -r media/* public/media/
          
          echo '<!DOCTYPE html>
          <html lang="vi">
          <head>
            <meta charset="UTF-8">
            <title>Kafka Sim Media</title>
          </head>
          <body>
            <h1>Thư mục Media (Manim)</h1>
            <p>Video kiến trúc Kafka (1080p60):</p>
            <ul>
              <li><a href="media/videos/kafka_sim/1080p60/KafkaArchitecture.mp4">Xem Video</a></li>
            </ul>
          </body>
          </html>' > public/index.html

      # Upload thư mục public thành Artifact thay vì push code
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build_media
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # Hoặc v5