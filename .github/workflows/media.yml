name: Build Manim Media and Deploy

on:
  push:
    branches: [main]
    paths:
      - "**/*.py"
  pull_request:
    branches: [main]
    paths:
      - "**/*.py"

permissions:
  contents: write

jobs:
  build_media_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================================================
      # 1. CÀI ĐẶT MÔI TRƯỜNG HỆ THỐNG CHO MANIM
      # =========================================================
      - name: Install system dependencies for Manim
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg build-essential libcairo2-dev libpango1.0-dev pkg-config

      # =========================================================
      # 2. CHUẨN BỊ MÔI TRƯỜNG PYTHON VỚI UV
      # =========================================================
      - name: Install uv
        if: github.ref == 'refs/heads/main'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        if: github.ref == 'refs/heads/main'
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        if: github.ref == 'refs/heads/main'
        run: uv sync

      # =========================================================
      # 3. CACHE MANIM PARTIAL MOVIE FILES
      # =========================================================
      - name: Cache Manim Media
        if: github.ref == 'refs/heads/main'
        uses: actions/cache@v4
        with:
          path: media/
          key: ${{ runner.os }}-manim-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-manim-

      # =========================================================
      # 4. RENDER VIDEO BẰNG MANIM
      # =========================================================
      - name: Render Manim Video
        if: github.ref == 'refs/heads/main'
        # Dùng cờ -qh để render chất lượng cao (1080p60)
        run: uv run manim -qh kafka_sim.py KafkaArchitecture

      # =========================================================
      # 5. CHUẨN BỊ FILE VÀ DEPLOY LÊN GITHUB PAGES
      # =========================================================
      - name: Prepare Web Files
        if: github.ref == 'refs/heads/main'
        run: |
          # Tạo thư mục public để gom các file cần deploy (giúp index.html nằm ở root)
          mkdir -p public/media
          # Copy toàn bộ kết quả render vào public/media/
          cp -r media/* public/media/
          
          # Tạo index.html ở thư mục gốc public
          echo '<!DOCTYPE html>
          <html lang="vi">
          <head>
            <meta charset="UTF-8">
            <title>Kafka Sim Media</title>
          </head>
          <body>
            <h1>Thư mục Media (Manim)</h1>
            <p>Video kiến trúc Kafka (1080p60):</p>
            <ul>
              <li><a href="media/videos/kafka_sim/1080p60/KafkaArchitecture.mp4">Xem Video</a></li>
            </ul>
          </body>
          </html>' > public/index.html

      - name: Deploy Media to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          destination_dir: .  # Deploy ra thư mục gốc của gh-pages
          keep_files: true    # Giữ lại các file cũ (từ latex.yml hoặc các deploy khác)